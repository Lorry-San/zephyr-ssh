name: Build Zephyr-SSH Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag. Leave empty to use main-<sha>.
        required: false
        default: ''

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set image names
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION_TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION_TAG="${{ github.ref_name }}"
          else
            VERSION_TAG="main-${GITHUB_SHA::7}"
          fi
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=ghcr.io/${OWNER_LOWER}/zephyr-ssh:${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${OWNER_LOWER}/zephyr-ssh:latest" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --build-arg ZEPHYR_VERSION="${VERSION_TAG}" -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .

      - name: Push Docker image
        run: |
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Generate changelog
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          CURRENT_TAG="${VERSION_TAG}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1)
          {
            echo "CHANGELOG<<EOF"
            echo ""
            if [ -z "$PREV_TAG" ]; then
              echo "## Initial release"
              echo ""
              git log --pretty=format:"- %s (%h)"
            else
              echo "## Changes"
              echo ""
              echo "**Compare**: \`$PREV_TAG\` -> \`$CURRENT_TAG\`"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)"
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Zephyr-SSH ${{ env.VERSION_TAG }}
          body: ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
