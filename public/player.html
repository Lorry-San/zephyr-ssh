<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>Zephyr H.264</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,sans-serif}
#shell{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{display:block;width:100%;height:auto;image-rendering:auto}
.status{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);padding:4px 12px;border-radius:6px;font-size:12px;z-index:10}
.btns{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.btns button{background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div id="shell"><canvas id="c"></canvas></div>
<div class="status" id="s">初始化...</div>
<div class="btns"><button id="fit">适应</button><button id="recon">重连</button></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),st=document.getElementById('s');
const params=new URLSearchParams(location.search);
const connId=params.get('connectionId')||'';
const wsUrl=(location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/rdp-h264?connectionId='+encodeURIComponent(connId);
let ws=null,vdec=null,cfgSet=false,zoom=1;

function log(s){st.textContent=s;}

function connect(){
  if(ws)try{ws.close()}catch{}
  if(vdec){try{vdec.close()}catch{};vdec=null;cfgSet=false}
  log('连接中...');
  ws=new WebSocket(wsUrl);
  ws.binaryType='arraybuffer';
  ws.onopen=()=>log('WebSocket 已连接');
  ws.onclose=(e)=>log('断开('+e.code+')');
  ws.onerror=()=>log('连接错误');
  ws.onmessage=async(ev)=>{
    const buf=ev.data instanceof ArrayBuffer?ev.data:await ev.data.arrayBuffer();
    if(!buf||buf.byteLength<5)return;
    const raw=new Uint8Array(buf);
    if(!vdec){
      if(!window.VideoDecoder){log('不支持 VideoDecoder');return}
      // 尝试从第一个 NAL 提取 SPS
      let cfg={codec:'avc1.42001E',codedWidth:1280,codedHeight:720};
      for(let i=0;i<raw.length-4;i++){
        if(raw[i]===0&&raw[i+1]===0&&raw[i+2]===0&&raw[i+3]===1){
          const t=raw[i+4]&0x1F;
          if(t===7){
            cfg.codedWidth=((raw[i+5]&0x0F)<<8)|raw[i+6];
            cfg.codedHeight=((raw[i+7]&0x0F)<<8)|raw[i+8];
            cfg.description=raw.slice(i,i+40);
            break;
          }
        }
      }
      try{
        const sup=await VideoDecoder.isConfigSupported(cfg);
        if(!sup.supported){log('H.264 配置不支持');return}
        vdec=new VideoDecoder({
          output:(f)=>{
            if(c.width!==f.displayWidth||c.height!==f.displayHeight){c.width=f.displayWidth;c.height=f.displayHeight}
            ctx.drawImage(f,0,0);f.close();
          },
          error:(e)=>console.warn('dec err',e.message)
        });
        vdec.configure(cfg);cfgSet=true;
        log('H.264 已连接');
      }catch(e){log('初始失败:'+e.message);return}
    }
    if(vdec&&cfgSet){
      try{vdec.decode(new EncodedVideoChunk({type:'key',timestamp:0,duration:0,data:raw}))}catch(e){}
    }
  };
}

// 输入转发
function inp(m){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(m));}
const sh=document.getElementById('shell');
sh.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();inp({type:'mouse',x:Math.round((e.clientX-r.left)*(c.width/r.width)),y:Math.round((e.clientY-r.top)*(c.height/r.height))})});
sh.addEventListener('mousedown',e=>{const r=c.getBoundingClientRect();inp({type:'mousedown',button:e.button+1})});
sh.addEventListener('mouseup',e=>inp({type:'mouseup',button:e.button+1}));
sh.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();inp({type:'mousedown',button:1})},{passive:false});
sh.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=c.getBoundingClientRect();inp({type:'mouse',x:Math.round((t.clientX-r.left)*(c.width/r.width)),y:Math.round((t.clientY-r.top)*(c.height/r.height))})},{passive:false});
sh.addEventListener('touchend',e=>{e.preventDefault();inp({type:'mouseup',button:1})},{passive:false});

document.getElementById('recon').addEventListener('click',connect);
document.getElementById('fit').addEventListener('click',()=>{
  zoom=zoom===1?2:zoom===2?0.5:1;
  c.style.width=(c.width*zoom)+'px';c.style.height=(c.height*zoom)+'px';
});

connect();
</script>
</body>
</html>
