<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zephyr-SSH - 终端</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link rel="stylesheet" href="/vendor/@wterm/dom/terminal.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
        {
            "imports": {
                "@wterm/core": "/vendor/@wterm/core/dist/index.js",
                "@wterm/core/": "/vendor/@wterm/core/"
            }
        }
    </script>
</head>
<body>
    <div class="terminal-page">
        <!-- 顶栏 -->
        <div class="terminal-topbar">
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
            <span class="info" id="connInfo"></span>
            <div style="display:flex;gap:8px;">
                <button class="btn-sm" id="fileBtn" title="文件管理">📁 文件</button>
                <button class="btn-sm" id="infoBtn" title="实时监控">📊 监控</button>
                <button class="btn-sm" id="copyBtn" title="复制选中内容">📋 复制</button>
                <button class="btn-sm" id="themeToggle" title="切换主题">🌓</button>
                <button class="btn-sm" id="reconnectBtn" title="重新连接">🔄 重连</button>
                <button class="btn-sm danger" id="disconnectBtn" title="断开连接">✕ 断开</button>
            </div>
        </div>

        <!-- 文件管理器覆盖层 -->
        <div class="file-manager" id="fileManager">
            <div class="panel-drag-handle" data-drag-panel="fileManager" title="拖动移动窗口">
                <button class="panel-traffic-btn" data-layout-panel="fileManager" title="窗口布局"><span></span></button>
            </div>
            <div class="fm-header panel-titlebar">
                <button class="tool-btn fm-back-btn" id="fmBackBtn" title="返回上级">⬆️ 上级</button>
                <div class="fm-path-box">
                    <input type="text" class="fm-path-input" id="fmPathInput" placeholder="输入路径">
                    <button class="tool-btn" id="fmGoBtn">跳转</button>
                </div>
                <button class="tool-btn fm-refresh-btn" id="fmRefreshBtn" title="刷新">🔄</button>
                <button class="tool-btn fm-close-btn" id="fmCloseBtn" title="关闭">✕</button>
            </div>
            <div class="fm-header">
                <input type="text" class="fm-search-input" id="fmSearchInput" placeholder="🔍 搜索当前目录...">
            </div>
            <div class="fm-toolbar">
                <button class="tool-btn" id="fmNewFolderBtn">📁 新建文件夹</button>
                <button class="tool-btn" id="fmNewFileBtn">📄 新建文件</button>
                <label class="tool-btn fm-upload-label" for="fmUploadInput">📤 上传文件</label>
                <input type="file" id="fmUploadInput" style="display:none;">
            </div>
            <div class="fm-list" id="fmList"></div>
            <div class="fm-editor-modal" id="fmEditorModal" style="display:none;">
                <div class="fm-editor-header">
                    <span id="fmEditorTitle">编辑文件</span>
                    <div class="fm-editor-header-actions">
                        <button class="tool-btn" id="fmEditorMinimapToggle" title="显示/隐藏代码概览">概览</button>
                        <button class="tool-btn" id="fmEditorUndoBtn" title="撤回">↶</button>
                        <button class="tool-btn" id="fmEditorRedoBtn" title="前进">↷</button>
                        <button class="tool-btn" id="fmEditorCloseBtn">关闭</button>
                    </div>
                </div>
                <div class="fm-editor-toolbar">
                    <label>编码
                        <select id="fmEditorEncoding" class="fm-editor-select">
                            <option value="utf-8">UTF-8</option>
                            <option value="utf-16le">UTF-16 LE</option>
                            <option value="utf-16be">UTF-16 BE</option>
                            <option value="latin1">Latin-1 / ISO-8859-1</option>
                        </select>
                    </label>
                    <label>换行
                        <select id="fmEditorLineEnding" class="fm-editor-select">
                            <option value="lf">LF</option>
                            <option value="crlf">CRLF</option>
                        </select>
                    </label>
                    <label>Tab
                        <select id="fmEditorTabSize" class="fm-editor-select">
                            <option value="2">2</option>
                            <option value="4" selected>4</option>
                            <option value="8">8</option>
                        </select>
                    </label>
                    <label class="fm-editor-check"><input type="checkbox" id="fmEditorWrap" checked> 自动换行</label>
                    <span class="fm-editor-status" id="fmEditorStatus">Ready</span>
                </div>
                <div class="fm-editor-code-shell">
                    <textarea class="fm-editor-textarea" id="fmEditorTextarea" rows="15"></textarea>
                    <div class="fm-editor-minimap" id="fmEditorMinimap" title="代码概览，点击快速定位"></div>
                </div>
                <div class="fm-editor-actions">
                    <button class="btn btn-primary" id="fmEditorSaveBtn">保存</button>
                    <button class="btn btn-secondary" id="fmEditorCancelBtn">取消</button>
                </div>
            </div>
            <div class="panel-resize-handle left" data-resize-panel="fileManager" data-resize-edge="left" title="拖动调整大小"></div>
            <div class="panel-resize-handle right" data-resize-panel="fileManager" data-resize-edge="right" title="拖动调整大小"></div>
        </div>

        <!-- 实时监控覆盖层 -->
        <div class="info-modal" id="infoModal" style="display:none;">
            <div class="panel-drag-handle" data-drag-panel="infoModal" title="拖动移动窗口">
                <button class="panel-traffic-btn" data-layout-panel="infoModal" title="窗口布局"><span></span></button>
            </div>
            <div class="info-modal-header panel-titlebar">
                <span>📊 服务器实时监控</span>
                <button class="tool-btn" id="infoCloseBtn">✕</button>
            </div>
            <div class="info-modal-body" id="infoBody">
                <!-- 内容由 JS 动态生成 -->
            </div>
            <div class="chart-container" id="chartContainer">
                <!-- 小折线图将由 JS 插入 -->
            </div>
            <div class="panel-resize-handle left" data-resize-panel="infoModal" data-resize-edge="left" title="拖动调整大小"></div>
            <div class="panel-resize-handle right" data-resize-panel="infoModal" data-resize-edge="right" title="拖动调整大小"></div>
        </div>

        <!-- 辅助工具栏 -->
        <div class="toolbar" id="toolbar">
            <div class="toolbar-row">
                <button class="tool-btn modifier" data-key="ctrl">Ctrl</button>
                <button class="tool-btn modifier" data-key="alt">Alt</button>
                <button class="tool-btn modifier" data-key="shift">Shift</button>
                <span class="tool-sep"></span>
                <button class="tool-btn func" data-key="esc">Esc</button>
                <button class="tool-btn func" data-key="tab">Tab</button>
                <button class="tool-btn func" data-key="home">Home</button>
                <button class="tool-btn func" data-key="end">End</button>
                <span class="tool-sep"></span>
                <button class="tool-btn arrow" data-key="up">↑</button>
                <button class="tool-btn arrow" data-key="down">↓</button>
                <button class="tool-btn arrow" data-key="left">←</button>
                <button class="tool-btn arrow" data-key="right">→</button>
                <span class="tool-sep"></span>
                <button class="tool-btn combo" data-key="ctrl-c">Ctrl+C</button>
                <button class="tool-btn combo" data-key="ctrl-d">Ctrl+D</button>
                <button class="tool-btn combo" data-key="ctrl-l">Ctrl+L</button>
                <button class="tool-btn combo" data-key="ctrl-u">Ctrl+U</button>
                <span class="tool-sep"></span>
                <button class="tool-btn font-size-btn" id="fontDecreaseBtn" title="缩小终端字体">A−</button>
                <button class="tool-btn font-size-btn" id="fontIncreaseBtn" title="放大终端字体">A+</button>
            </div>
            <div class="cmd-input-row">
                <input type="text" class="cmd-input" id="cmdInput" placeholder="在此输入命令，回车发送..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <button class="cmd-send-btn" id="cmdSendBtn">发送</button>
            </div>
        </div>

        <!-- 终端容器 -->
        <div class="terminal-container" id="terminalContainer">
            <div class="terminal-overlay" id="terminalOverlay">
                <div class="spinner"></div>
                <span class="msg" id="overlayMsg">正在建立 SSH 连接...</span>
            </div>
            <div class="wterm-wrapper" id="wtermWrapper"></div>
        </div>
    </div>
    <script src="terminal.js" type="module"></script>
</body>
</html>
