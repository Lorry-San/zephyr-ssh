<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zephyr-SSH - 终端</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link rel="stylesheet" href="/vendor/@wterm/dom/terminal.css">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "@wterm/core": "/vendor/@wterm/core/dist/index.js",
                "@wterm/core/": "/vendor/@wterm/core/"
            }
        }
    </script>
</head>
<body>
    <div class="terminal-page">
        <div class="terminal-topbar">
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
            <span class="info" id="connInfo"></span>
            <div style="display:flex;gap:8px;">
                <button class="btn-sm" id="copyBtn" title="复制选中内容">📋 复制</button>
                <select class="theme-select" id="terminalThemeSelect">
                    <option value="default">💻 Default</option>
                    <option value="solarized">☀️ Solarized</option>
                    <option value="monokai">🧛 Monokai</option>
                    <option value="light">💡 Light</option>
                </select>
                <button class="btn-sm" id="themeToggle" title="切换主题">🌓</button>
                <button class="btn-sm" id="reconnectBtn" title="重新连接">🔄 重连</button>
                <button class="btn-sm danger" id="disconnectBtn" title="断开连接">✕ 断开</button>
            </div>
        </div>

        <div class="toolbar" id="toolbar">
            <div class="toolbar-row">
                <button class="tool-btn modifier" data-key="ctrl">Ctrl</button>
                <button class="tool-btn modifier" data-key="alt">Alt</button>
                <button class="tool-btn modifier" data-key="shift">Shift</button>
                <span class="tool-sep"></span>
                <button class="tool-btn func" data-key="esc">Esc</button>
                <button class="tool-btn func" data-key="tab">Tab</button>
                <button class="tool-btn func" data-key="home">Home</button>
                <button class="tool-btn func" data-key="end">End</button>
                <span class="tool-sep"></span>
                <button class="tool-btn arrow" data-key="up">↑</button>
                <button class="tool-btn arrow" data-key="down">↓</button>
                <button class="tool-btn arrow" data-key="left">←</button>
                <button class="tool-btn arrow" data-key="right">→</button>
                <span class="tool-sep"></span>
                <button class="tool-btn combo" data-key="ctrl-c">Ctrl+C</button>
                <button class="tool-btn combo" data-key="ctrl-d">Ctrl+D</button>
                <button class="tool-btn combo" data-key="ctrl-l">Ctrl+L</button>
                <button class="tool-btn combo" data-key="ctrl-u">Ctrl+U</button>
            </div>
            <div class="cmd-input-row">
                <input type="text" class="cmd-input" id="cmdInput" placeholder="在此输入命令，回车发送..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <button class="cmd-send-btn" id="cmdSendBtn">发送</button>
            </div>
        </div>

        <div class="terminal-container" id="terminalContainer">
            <div class="terminal-overlay" id="terminalOverlay">
                <div class="spinner"></div>
                <span class="msg" id="overlayMsg">正在建立 SSH 连接...</span>
            </div>
            <div class="wterm-wrapper" id="wtermWrapper"></div>
        </div>
    </div>
    <script src="terminal.js" type="module"></script>
</body>
</html>
