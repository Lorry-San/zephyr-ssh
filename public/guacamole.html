<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Zephyr - 远程桌面</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="guac-page">
        <div class="terminal-topbar guac-topbar">
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
            <span class="info" id="connInfo"></span>
            <div class="topbar-actions">
                <button class="btn-sm" id="qualityBtn" title="切换性能/画质模式">⚡ 平衡</button>
                <button class="btn-sm" id="fitBtn" title="适应窗口">↔ 适应</button>
                <button class="btn-sm" id="zoomBtn" title="缩放远程画面">🔍 100%</button>
                <button class="btn-sm" id="clipboardBtn" title="打开跨设备剪贴板面板">📋 剪贴板</button>
                <button class="btn-sm" id="keyboardBtn" title="手机软键盘输入">⌨ 键盘</button>
                <button class="btn-sm" id="shortcutsBtn" title="打开常用快捷键">⚡ 快捷键</button>
                <button class="btn-sm" id="ctrlAltDelBtn" title="发送 Ctrl+Alt+Del">Ctrl+Alt+Del</button>
                <button class="btn-sm" id="reconnectBtn" title="重新连接">🔄 重连</button>
                <button class="btn-sm danger" id="disconnectBtn" title="断开连接">✕ 断开</button>
            </div>
        </div>
        <div class="guac-stage" id="guacStage" tabindex="0">
            <textarea id="mobileKeyboardInput" class="guac-mobile-keyboard-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" enterkeyhint="done" aria-label="远程桌面软键盘输入"></textarea>
            <div id="rdpTouchHud" class="rdp-touch-hud" hidden></div>
            <div id="rdpPointer" class="rdp-pointer" hidden></div>

            <div class="guac-floating-panel clipboard-panel" id="clipboardPanel" hidden>
                <div class="panel-drag-handle" data-drag-panel="clipboardPanel" title="拖动移动窗口">
                    <button class="panel-traffic-btn" data-layout-panel="clipboardPanel" title="窗口布局"><span></span></button>
                </div>
                <div class="guac-panel-content">
                    <div class="guac-panel-head panel-titlebar">
                        <strong>跨设备剪贴板</strong>
                    </div>
                    <label class="guac-panel-label" for="clipboardText">本机 → 远程</label>
                    <textarea id="clipboardText" class="guac-panel-textarea" placeholder="输入或粘贴要发送到远程桌面的文本"></textarea>
                    <div class="guac-panel-actions">
                        <button class="btn-sm" id="clipboardReadLocalBtn">读取本机</button>
                        <button class="btn-sm active" id="clipboardSendBtn">发送到远程</button>
                    </div>
                    <label class="guac-panel-label" for="remoteClipboardText">远程 → 本机</label>
                    <textarea id="remoteClipboardText" class="guac-panel-textarea" readonly placeholder="远程复制文本后会显示在这里"></textarea>
                    <div class="guac-panel-actions">
                        <button class="btn-sm" id="clipboardCopyRemoteBtn">复制到本机</button>
                        <span class="guac-panel-hint" id="clipboardHint">等待远程剪贴板...</span>
                    </div>
                </div>
                <div class="panel-resize-handle left" data-resize-panel="clipboardPanel" data-resize-edge="left" title="拖动调整大小"></div>
                <div class="panel-resize-handle right" data-resize-panel="clipboardPanel" data-resize-edge="right" title="拖动调整大小"></div>
            </div>

            <div class="guac-floating-panel shortcuts-panel" id="shortcutsPanel" hidden>
                <div class="panel-drag-handle" data-drag-panel="shortcutsPanel" title="拖动移动窗口">
                    <button class="panel-traffic-btn" data-layout-panel="shortcutsPanel" title="窗口布局"><span></span></button>
                </div>
                <div class="guac-panel-content">
                    <div class="guac-panel-head panel-titlebar">
                        <strong>快捷键 / 手机辅助</strong>
                    </div>
                    <div class="guac-shortcut-grid" id="shortcutGrid">
                        <button class="tool-btn" data-keyseq="esc">Esc</button>
                        <button class="tool-btn" data-keyseq="tab">Tab</button>
                        <button class="tool-btn" data-keyseq="enter">Enter</button>
                        <button class="tool-btn" data-keyseq="backspace">Backspace</button>
                        <button class="tool-btn" data-keyseq="win">Win</button>
                        <button class="tool-btn" data-keyseq="alt-tab">Alt+Tab</button>
                        <button class="tool-btn" data-keyseq="ctrl-a">Ctrl+A</button>
                        <button class="tool-btn" data-keyseq="ctrl-b">Ctrl+B</button>
                        <button class="tool-btn" data-keyseq="ctrl-c">Ctrl+C</button>
                        <button class="tool-btn" data-keyseq="ctrl-d">Ctrl+D</button>
                        <button class="tool-btn" data-keyseq="ctrl-e">Ctrl+E</button>
                        <button class="tool-btn" data-keyseq="ctrl-f">Ctrl+F</button>
                        <button class="tool-btn" data-keyseq="ctrl-g">Ctrl+G</button>
                        <button class="tool-btn" data-keyseq="ctrl-h">Ctrl+H</button>
                        <button class="tool-btn" data-keyseq="ctrl-i">Ctrl+I</button>
                        <button class="tool-btn" data-keyseq="ctrl-j">Ctrl+J</button>
                        <button class="tool-btn" data-keyseq="ctrl-k">Ctrl+K</button>
                        <button class="tool-btn" data-keyseq="ctrl-l">Ctrl+L</button>
                        <button class="tool-btn" data-keyseq="ctrl-m">Ctrl+M</button>
                        <button class="tool-btn" data-keyseq="ctrl-n">Ctrl+N</button>
                        <button class="tool-btn" data-keyseq="ctrl-o">Ctrl+O</button>
                        <button class="tool-btn" data-keyseq="ctrl-p">Ctrl+P</button>
                        <button class="tool-btn" data-keyseq="ctrl-q">Ctrl+Q</button>
                        <button class="tool-btn" data-keyseq="ctrl-r">Ctrl+R</button>
                        <button class="tool-btn" data-keyseq="ctrl-s">Ctrl+S</button>
                        <button class="tool-btn" data-keyseq="ctrl-t">Ctrl+T</button>
                        <button class="tool-btn" data-keyseq="ctrl-u">Ctrl+U</button>
                        <button class="tool-btn" data-keyseq="ctrl-v">Ctrl+V</button>
                        <button class="tool-btn" data-keyseq="ctrl-w">Ctrl+W</button>
                        <button class="tool-btn" data-keyseq="ctrl-x">Ctrl+X</button>
                        <button class="tool-btn" data-keyseq="ctrl-y">Ctrl+Y</button>
                        <button class="tool-btn" data-keyseq="ctrl-z">Ctrl+Z</button>
                        <button class="tool-btn" data-keyseq="up">↑</button>
                        <button class="tool-btn" data-keyseq="down">↓</button>
                        <button class="tool-btn" data-keyseq="left">←</button>
                        <button class="tool-btn" data-keyseq="right">→</button>
                        <button class="tool-btn" data-keyseq="home">Home</button>
                        <button class="tool-btn" data-keyseq="end">End</button>
                        <button class="tool-btn" data-keyseq="pageup">PgUp</button>
                        <button class="tool-btn" data-keyseq="pagedown">PgDn</button>
                        <button class="tool-btn" data-keyseq="f1">F1</button>
                        <button class="tool-btn" data-keyseq="f2">F2</button>
                        <button class="tool-btn" data-keyseq="f3">F3</button>
                        <button class="tool-btn" data-keyseq="f4">F4</button>
                        <button class="tool-btn" data-keyseq="f5">F5</button>
                        <button class="tool-btn" data-keyseq="f6">F6</button>
                        <button class="tool-btn" data-keyseq="f7">F7</button>
                        <button class="tool-btn" data-keyseq="f8">F8</button>
                        <button class="tool-btn" data-keyseq="f9">F9</button>
                        <button class="tool-btn" data-keyseq="f10">F10</button>
                        <button class="tool-btn" data-keyseq="f11">F11</button>
                        <button class="tool-btn" data-keyseq="f12">F12</button>
                    </div>
                    <div class="guac-panel-hint">提示：单指点远程桌面会发送鼠标左键点击；点“⌨ 键盘”可唤起手机输入法。</div>
                </div>
                <div class="panel-resize-handle left" data-resize-panel="shortcutsPanel" data-resize-edge="left" title="拖动调整大小"></div>
                <div class="panel-resize-handle right" data-resize-panel="shortcutsPanel" data-resize-edge="right" title="拖动调整大小"></div>
            </div>

            <div class="terminal-overlay" id="guacOverlay">
                <div class="spinner"></div>
                <span class="msg" id="overlayMsg">正在建立 VNC 连接...</span>
            </div>
            <div class="guac-display-shell" id="displayShell">
                <div class="guac-display" id="display"></div>
            </div>
        </div>
    </div>
    <script src="guacamole.js?v=20260531-rdp-resize-stability" type="module"></script>
</body>
</html>
