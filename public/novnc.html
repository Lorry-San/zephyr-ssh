<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zephyr - noVNC</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link rel="stylesheet" href="style.css?v=20260608-novnc-ui">
</head>
<body>
    <div class="novnc-page">
        <header class="novnc-topbar">
            <div class="novnc-identity">
                <div class="novnc-orb" aria-hidden="true"><span></span></div>
                <div class="novnc-title-group">
                    <span class="novnc-eyebrow">Zephyr noVNC</span>
                    <strong id="connTitle">VNC 远程桌面</strong>
                </div>
            </div>
            <div class="novnc-status-card" id="statusCard">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
                <em id="connInfo"></em>
            </div>
            <div class="novnc-toolbar" role="toolbar" aria-label="noVNC 控制栏">
                <button class="novnc-tool" id="qualityBtn" type="button" title="切换画质/性能"><span>画质</span><strong id="qualityLabel">平衡</strong></button>
                <button class="novnc-tool" id="fitBtn" type="button" title="切换适应/原始/拖拽视区"><span>视图</span><strong id="fitLabel">适应</strong></button>
                <button class="novnc-icon-btn" id="dragBtn" type="button" title="拖动画面">⇄</button>
                <button class="novnc-icon-btn" id="clipboardBtn" type="button" title="剪贴板">⌘</button>
                <button class="novnc-icon-btn" id="keyboardBtn" type="button" title="手机键盘">⌨</button>
                <button class="novnc-icon-btn" id="shortcutsBtn" type="button" title="快捷键">⌁</button>
                <button class="novnc-icon-btn" id="cadBtn" type="button" title="发送 Ctrl+Alt+Del">CAD</button>
                <button class="novnc-icon-btn" id="reconnectBtn" type="button" title="重新连接">↻</button>
                <button class="novnc-icon-btn danger" id="disconnectBtn" type="button" title="断开">⏻</button>
            </div>
        </header>

        <main class="novnc-stage" id="novncStage" tabindex="0">
            <textarea id="mobileKeyboardInput" class="novnc-mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" enterkeyhint="done" aria-label="VNC 软键盘输入"></textarea>

            <section class="novnc-screen-shell" id="screenShell" aria-label="VNC 画面区域">
                <div class="novnc-screen-bg" aria-hidden="true"></div>
                <div class="novnc-screen" id="screen"></div>
            </section>

            <div class="novnc-overlay" id="novncOverlay">
                <div class="novnc-loader"><i></i><i></i><i></i></div>
                <strong id="overlayTitle">正在建立 noVNC 连接</strong>
                <span id="overlayMsg">通过 Zephyr 安全代理连接 VNC，密码不会发送到浏览器。</span>
            </div>

            <aside class="novnc-panel clipboard-panel" id="clipboardPanel" hidden>
                <div class="novnc-panel-head">
                    <strong>跨设备剪贴板</strong>
                    <button class="novnc-panel-close" type="button" data-close-panel="clipboardPanel">×</button>
                </div>
                <label for="clipboardText">本机 → 远程</label>
                <textarea id="clipboardText" placeholder="输入或粘贴文本，然后发送到 VNC 剪贴板"></textarea>
                <div class="novnc-panel-actions">
                    <button class="novnc-secondary" id="clipboardReadLocalBtn" type="button">读取本机</button>
                    <button class="novnc-primary" id="clipboardSendBtn" type="button">发送到远程</button>
                </div>
                <label for="remoteClipboardText">远程 → 本机</label>
                <textarea id="remoteClipboardText" readonly placeholder="远程复制文本后会显示在这里"></textarea>
                <div class="novnc-panel-actions">
                    <button class="novnc-secondary" id="clipboardCopyRemoteBtn" type="button">复制到本机</button>
                    <span id="clipboardHint">等待远程剪贴板...</span>
                </div>
            </aside>

            <aside class="novnc-panel shortcuts-panel" id="shortcutsPanel" hidden>
                <div class="novnc-panel-head">
                    <strong>快捷键 / 手机辅助</strong>
                    <button class="novnc-panel-close" type="button" data-close-panel="shortcutsPanel">×</button>
                </div>
                <div class="novnc-shortcut-grid" id="shortcutGrid">
                    <button data-keyseq="esc">Esc</button><button data-keyseq="tab">Tab</button><button data-keyseq="enter">Enter</button><button data-keyseq="backspace">Backspace</button>
                    <button data-keyseq="ctrl-alt-del">Ctrl+Alt+Del</button><button data-keyseq="super">Win</button><button data-keyseq="alt-tab">Alt+Tab</button><button data-keyseq="delete">Delete</button>
                    <button data-keyseq="ctrl-a">Ctrl+A</button><button data-keyseq="ctrl-c">Ctrl+C</button><button data-keyseq="ctrl-v">Ctrl+V</button><button data-keyseq="ctrl-x">Ctrl+X</button>
                    <button data-keyseq="up">↑</button><button data-keyseq="down">↓</button><button data-keyseq="left">←</button><button data-keyseq="right">→</button>
                    <button data-keyseq="home">Home</button><button data-keyseq="end">End</button><button data-keyseq="pageup">PgUp</button><button data-keyseq="pagedown">PgDn</button>
                    <button data-keyseq="f1">F1</button><button data-keyseq="f2">F2</button><button data-keyseq="f3">F3</button><button data-keyseq="f4">F4</button>
                    <button data-keyseq="f5">F5</button><button data-keyseq="f6">F6</button><button data-keyseq="f7">F7</button><button data-keyseq="f8">F8</button>
                    <button data-keyseq="f9">F9</button><button data-keyseq="f10">F10</button><button data-keyseq="f11">F11</button><button data-keyseq="f12">F12</button>
                </div>
                <p class="novnc-panel-note">提示：中文/长文本会优先发送到远程剪贴板；普通 ASCII 字符会直接按键输入。</p>
            </aside>
        </main>
    </div>
    <script src="novnc.js?v=20260609-ai-rdp-vnc-tools" type="module"></script>
</body>
</html>
