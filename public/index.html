<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zephyr-SSH - 登录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌬️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <!-- 主题切换按钮 -->
        <button class="theme-btn-login" id="themeToggleLogin" title="切换主题">🌓</button>
        <div class="logo">🌬️</div>
        <h1>Zephyr-SSH</h1>
        <div id="errorBanner" class="error-banner"></div>
        <form id="loginForm" autocomplete="off">
            <div class="form-row">
                <div class="form-group">
                    <label for="host">主机地址</label>
                    <input type="text" id="host" placeholder="192.168.1.1 或 example.com" required>
                </div>
                <div class="form-group port-group">
                    <label for="port">端口</label>
                    <input type="number" id="port" value="22" min="1" max="65535" required>
                </div>
            </div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="root" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="SSH 密码（或私钥短语）">
            </div>
            <div class="toggle-section">
                <button type="button" class="toggle-link" id="toggleKeyBtn">🔑 使用私钥认证</button>
            </div>
            <div class="form-group key-section" id="keySection">
                <label for="privateKey">私钥 (PEM格式)</label>
                <textarea id="privateKey" placeholder="-----BEGIN RSA PRIVATE KEY-----
        -----END RSA PRIVATE KEY-----"></textarea>
            </div>
            <div class="form-group">
                <label for="initCmd">初始命令 <span style="font-weight:400;color:var(--text-secondary)">（可选）</span></label>
                <input type="text" id="initCmd" placeholder="例如: ls -la 或 screen -r">
            </div>
            <button type="submit" class="btn btn-primary" id="connectBtn">
                ⚡ 连接 SSH
            </button>
        </form>
    </div>
    <script src="client.js" type="module"></script>
</body>
</html>
